ze:0.82rem;color:var(--muted);line-height:2;margin-bottom:1rem;}a{color:var(--lilac);text-decoration:underline dotted;opacity:0.8;transition:opacity 0.2s;}a:hover{opacity:1;}/* INICIO */#inicio{padding:8px 0 40px;}.welcome-box{border:1px solid var(--lavender);background:var(--paper);padding:20px 22px;margin-bottom:20px;box-shadow:2px 2px 0 var(--lavender);position:relative;}.welcome-box::before{content:'✦';position:absolute;top:-10px;left:18px;background:var(--paper);padding:0 6px;color:var(--lavender);font-size:1rem;}.tw-line{font-size:0.82rem;color:var(--muted);line-height:2.1;}#tw-cur{animation:blink 1s infinite;color:var(--lilac);}@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}.inicio-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}.i-box{border:1px solid var(--lavender);background:var(--paper);padding:14px 16px;box-shadow:1px 1px 0 var(--dim);}.i-box-title{font-family:var(--vt);font-size:0.95rem;color:var(--lilac);letter-spacing:0.1em;margin-bottom:8px;border-bottom:0.5px dashed var(--lavender);padding-bottom:4px;}.i-box p{font-size:0.78rem;margin-bottom:0;}/* POSTS */.post{border:1px solid var(--lavender);background:var(--paper);padding:18px 20px;margin-bottom:14px;box-shadow:2px 2px 0 var(--lavender);position:relative;transition:transform 0.15s;}.post:hover{transform:translate(-1px,-1px);}.post-date{font-family:var(--vt);font-size:0.85rem;color:var(--dim);letter-spacing:0.15em;margin-bottom:6px;display:flex;align-items:center;gap:10px;}.read-time{font-family:var(--vt);font-size:0.75rem;color:var(--dim);opacity:0.7;}.post-title{font-family:var(--hand);font-size:1.7rem;color:var(--text);margin-bottom:8px;line-height:1.2;}.post-excerpt{font-size:0.78rem;color:var(--muted);line-height:2;margin-bottom:12px;}.post-cover{width:100%;max-height:200px;object-fit:cover;border:1px solid var(--lavender);margin-top:12px;display:block;}.read-more{font-family:var(--vt);font-size:0.9rem;color:var(--lilac);text-decoration:none;letter-spacing:0.1e
