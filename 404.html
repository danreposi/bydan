<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>bydan — 404</title><link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=VT323&display=swap" rel="stylesheet"><style>:root{--bg:#f0edf5;--paper:#faf8fc;--text:#2e2a3a;--muted:#7a7290;--dim:#b0aac0;--lilac:#9b8fbd;--lavender:#c4b8e0;--hand:'Caveat',cursive;--vt:'VT323',monospace;--mono:'Space Mono',monospace;}*{box-sizing:border-box;margin:0;padding:0;cursor:none;}body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;min-height:100vh;display:flex;align-items:center;justify-content:center;}#cur{width:6px;height:6px;background:var(--lilac);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}.box{border:1.5px solid var(--lavender);background:var(--paper);padding:48px 56px;text-align:center;box-shadow:4px 4px 0 var(--lavender);max-width:420px;}.num{font-family:var(--hand);font-size:6rem;font-weight:700;color:var(--lavender);line-height:1;display:block;}.msg{font-family:var(--vt);font-size:1rem;color:var(--dim);letter-spacing:0.15em;display:block;margin:12px 0 28px;}.note{font-family:var(--hand);font-size:1.1rem;color:var(--muted);margin-bottom:24px;display:block;}a{font-family:var(--vt);font-size:0.9rem;color:var(--lilac);text-decoration:none;letter-spacing:0.1em;border:1px solid var(--lavender);padding:6px 18px;background:var(--bg);cursor:none;}a:hover{color:var(--text);}</style></head><body><div id="cur"></div><div class="box"><span class="num">404</span><span class="msg">// página não encontrada</span><span class="note">este lugar não existe mais, ou nunca existiu.</span><a href="/">[ voltar ao arquivo ]</a></div><script>const cur=document.getElementById('cur');document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});</script></body></html>
